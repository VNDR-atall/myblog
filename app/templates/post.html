{% extends "base.html" %}
{% block title %}{{ post.title }} - 我的博客{% endblock title %}
{% block content %}
<h1>{{ post.title }}</h1>
<div class="post-meta">
    <span>发布日期：{{ post.created_date.strftime('%Y-%m-%d') }}</span>
    {% if post.tags %}<span>标签：{{ post.tags }}</span>{% endif %}
</div>
<hr>
<div class="post-content">
    {{ content|safe }}
</div>
<p><a href="{{ url_for('main.index') }}">返回首页</a></p>
{% endblock content %}
