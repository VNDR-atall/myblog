{% extends "base.html" %}
{% block title %}新建文章 - 我的博客{% endblock title %}
{% block content %}
<style>
    /* 表单样式 */
    .form-container {
        background-color: var(--white);
        border-radius: var(--border-radius);
        padding: 2rem;
        box-shadow: var(--shadow);
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--secondary-color);
    }
    
    .form-group input[type="text"],
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--gray);
        border-radius: var(--border-radius);
        font-size: 1rem;
        transition: var(--transition);
    }
    
    .form-group input[type="text"]:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }
    
    .form-group textarea {
        resize: vertical;
        font-family: 'Courier New', Courier, monospace;
    }
    
    .form-group small {
        display: block;
        margin-top: 0.25rem;
        color: #777;
        font-size: 0.8rem;
    }
    
    .submit-btn {
        background-color: var(--primary-color);
        color: var(--white);
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--border-radius);
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
    }
    
    .submit-btn:hover {
        background-color: #2980b9;
    }
</style>
<div class="form-container">
    <h1>新建文章</h1>
    <form method="post">
        <div class="form-group">
            <label for="title">标题：</label>
            <input type="text" name="title" id="title" required size="50">
        </div>
        <div class="form-group">
            <label for="slug">URL标识：</label>
            <input type="text" name="slug" id="slug" required pattern="[a-z0-9-]+" title="只能包含小写字母、数字和短横线">
            <small>只能包含字母、数字和短横线</small>
        </div>
        <div class="form-group">
            <label for="tags">标签：</label>
            <input type="text" name="tags" id="tags" size="50">
            <small>多个标签用逗号分隔</small>
        </div>
        <div class="form-group">
            <label for="summary">摘要：</label>
            <textarea name="summary" id="summary" rows="3" cols="60"></textarea>
        </div>
        <div class="form-group">
            <label for="content">Markdown 内容：</label>
            <textarea name="content" id="content" rows="15" cols="80"></textarea>
        </div>
        <div class="form-group">
            <button type="submit" class="submit-btn">保存</button>
        </div>
    </form>
</div>
{% endblock content %}
