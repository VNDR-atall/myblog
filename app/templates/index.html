{% extends "base.html" %}
{% block title %}首页 - 我的博客{% endblock title %}
{% block content %}
<h1>文章列表</h1>
{% if posts %}
    <ul>
    {% for post in posts %}
        <li>
            <a href="{{ url_for('main.post', slug=post.slug) }}">{{ post.title }}</a>
            <small>{{ post.created_date.strftime('%Y-%m-%d') }}</small>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>还没有任何文章，<a href="{{ url_for('main.new_post') }}">点击新建</a>。</p>
{% endif %}
{% endblock content %}
