{% extends "base.html" %}
{% block title %}注册 - VNDR{% endblock title %}
{% block content %}
<h1>用户注册</h1>

<div class="form-container" style="max-width: 520px;">
    <form method="post" enctype="multipart/form-data">
        {% if error %}
            <p style="color: #c0392b; margin-bottom: 1rem;">{{ error }}</p>
        {% endif %}

        <div class="form-group">
            <label for="username">用户名：</label>
            <input type="text" name="username" id="username" required autocomplete="username" />
            <small style="color: #7f8c8d; display: block; margin-top: 0.25rem;">用户名应在2-8个字符之间</small>
        </div>

        <div class="form-group">
            <label for="password">密码：</label>
            <input type="password" name="password" id="password" required autocomplete="new-password" />
            <small style="color: #7f8c8d; display: block; margin-top: 0.25rem;">密码应在6-20个字符之间，可包含数字、字母和符号</small>
        </div>

        <div class="form-group">
            <label for="confirm_password">确认密码：</label>
            <input type="password" name="confirm_password" id="confirm_password" required autocomplete="new-password" />
        </div>

        <div class="form-group">
            <label for="avatar">头像（可选）：</label>
            <input type="file" name="avatar" id="avatar" accept=".jpg,.png" />
            <small style="color: #7f8c8d; display: block; margin-top: 0.25rem;">支持jpg、png格式，大小不超过2MB</small>
        </div>

        <button type="submit" class="submit-btn">注册</button>
    </form>
</div>

<style>
    .form-container {
        background-color: var(--white);
        border-radius: var(--border-radius);
        padding: 2rem;
        box-shadow: var(--shadow);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--secondary-color);
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--gray);
        border-radius: var(--border-radius);
        font-size: 1rem;
        transition: var(--transition);
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .submit-btn {
        background-color: var(--primary-color);
        color: var(--white);
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: var(--border-radius);
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
    }

    .submit-btn:hover {
        background-color: #2980b9;
    }
</style>
{% endblock content %}
